{{define "card"}}
<div class="card">
  <h3>{{.title}}</h3>
  <p>{{.body}}</p>
</div>

<style>
  .card { background: #fff; border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1rem;
          border: 1px solid #e0e0e0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card h3 { font-size: 1rem; margin-bottom: .4rem; color: #1a1a2e; }
  .card p  { color: #666; line-height: 1.6; font-size: .95rem; }
</style>
{{end}}
