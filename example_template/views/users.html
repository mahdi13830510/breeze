{{define "content"}}
<div class="page">
  <h1>Users</h1>

  <div id="users-table">
    {{component "users-table" .Data.users}}
  </div>

  <div class="add-form">
    <input id="new-name"  type="text" placeholder="Name" />
    <input id="new-email" type="text" placeholder="Email" />
    <button id="add-user-btn">+ Add user</button>
  </div>

  <div id="ws-log-box">
    {{component "ws-log" (map)}}
  </div>
</div>

<script data-spa-run="once">
  // ── Reactive state, the enterprise-friendly way ─────────────────────────
  //
  // breeze.bind() ties #users-table to breeze.data().users: any mutation of
  // that array — from breeze.list() below, another tab via WS, or a plain
  // .push()/.splice() on breeze.data().users directly — automatically
  // re-renders the table. No manual breeze.render() call after every edit,
  // and no local shadow copy of the array to keep in sync by hand.
  //
  // data-spa-run="once" re-runs this script once each time you navigate to
  // /users — including via the back/forward button — which is what makes
  // usersList below always operate on the currently displayed route's
  // data. But breeze.bind(), breeze.on(), and breeze.ws() each register
  // something persistent (a binding entry, a document-level listener, a
  // socket) that must only ever be registered once per page lifetime —
  // _rerender()/delegated listeners re-resolve their DOM targets by
  // selector at call time, so one registration keeps working across any
  // number of future visits; registering again on every visit would just
  // accumulate duplicates (multiple fires per click, extra sockets).
  var usersList = breeze.list('users');

  function pushLog(msg) {
    var logs = breeze.data('logs') || [];
    logs = [ '[' + new Date().toLocaleTimeString() + '] ' + msg ].concat(logs);
    breeze.data().logs = logs; // reactive set — keeps breeze.data() in sync too
    breeze.render('ws-log', logs, '#ws-log-box');
  }

  if (!window._usersInitialized) {
    window._usersInitialized = true;

    breeze.bind('#users-table', 'users-table', 'users');

    breeze.on('#add-user-btn', 'click', function() {
      var nameEl  = document.getElementById('new-name');
      var emailEl = document.getElementById('new-email');
      var name  = nameEl.value.trim();
      var email = emailEl.value.trim();
      if (!name || !email) return;

      var newUser = { ID: String(usersList.all().length + 1), Name: name, Email: email };

      // Mutating .add() alone already updates #users-table via the
      // breeze.bind() above — the calls below persist to the server and
      // broadcast to other clients, they don't drive this page's UI.
      usersList.add(newUser);

      fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newUser),
        credentials: 'same-origin',
      }).then(function() {
        // A row was added server-side too: any other cached route that
        // lists users (there's only this one today, but this generalises)
        // must not replay a pre-add snapshot on a future visit.
        breeze.invalidateAll();
      });

      if (window._chatSocket) window._chatSocket.send(JSON.stringify({ event: 'user:added', user: newUser }));

      nameEl.value  = '';
      emailEl.value = '';
    });

    breeze.on('.remove-user', 'click', function(e, el) {
      var id = el.getAttribute('data-id');
      usersList.remove(function(u) { return u.ID === id; });

      fetch('/api/users/' + id, { method: 'DELETE', credentials: 'same-origin' })
        .then(function() { breeze.invalidateAll(); });

      if (window._chatSocket) window._chatSocket.send(JSON.stringify({ event: 'user:removed', id: id }));
    });

    window._chatSocket = breeze.ws('/ws', {
      onOpen:  function() { pushLog('Connected to /ws'); },
      onClose: function() { pushLog('Disconnected — reconnecting...'); },
      onMessage: function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg.event === 'user:added') {
            usersList.add(msg.user);
            pushLog('New user from another client: ' + msg.user.Name);
          } else if (msg.event === 'user:removed') {
            usersList.remove(function(u) { return u.ID === msg.id; });
            pushLog('User removed by another client: ' + msg.id);
          } else {
            pushLog(e.data);
          }
        } catch (_) {
          pushLog(e.data);
        }
      },
    });
  }
</script>

<style>
  .page h1 { font-size: 2rem; margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; background: #fff;
          border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  th { background: #1a1a2e; color: #fff; padding: .75rem 1rem; text-align: left; font-size: .85rem; }
  td { padding: .75rem 1rem; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  .add-form { display: flex; gap: .75rem; margin-top: 1.25rem; flex-wrap: wrap; }
  .add-form input { padding: .5rem .75rem; border: 1px solid #ddd; border-radius: 6px;
                    font-size: .95rem; flex: 1; min-width: 140px; }
  .add-form button { padding: .5rem 1.1rem; background: #1a1a2e; color: #fff;
                     border: none; border-radius: 6px; cursor: pointer; }
  .add-form button:hover { background: #7c83fd; }
  .ws-log { margin-top: 1.5rem; background: #1a1a2e; color: #eee; border-radius: 8px;
            padding: 1rem 1.25rem; font-size: .85rem; max-height: 160px; overflow-y: auto; }
  .ws-log strong { color: #7c83fd; display: block; margin-bottom: .5rem; }
  #ws-messages p { margin: .2rem 0; font-family: monospace; color: #aaa; }
</style>
{{end}}
