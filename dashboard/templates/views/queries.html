{{define "content"}}
<div class="table-wrap">
  <div class="table-head">
    <h3>ORM Queries (<span id="q-count">0</span>)</h3>
    <div class="filters">
      <label style="font-size:11px"><input type="checkbox" id="slow-only"> Slow only</label>
      <input id="q-search" placeholder="Search SQL...">
    </div>
  </div>
  <div class="table-scroll" style="max-height:560px;overflow:auto">
    <table>
      <thead><tr><th>Time</th><th>SQL</th><th>Duration</th><th>Rows</th><th>Location</th><th>Status</th></tr></thead>
      <tbody id="q-tbody"></tbody>
    </table>
  </div>
</div>
<script data-spa-run="always">
BreezeDash.initPage('queries');
</script>
{{end}}
