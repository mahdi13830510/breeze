{{define "content"}}
<div class="cards" id="overview-cards"></div>
<div class="chart-row">
  <div class="chart-card"><div class="head"><h3>Requests / second</h3></div><canvas id="chart-rps" style="width:100%;height:200px;display:block"></canvas></div>
  <div class="chart-card"><div class="head"><h3>Response time (ms)</h3></div><canvas id="chart-latency" style="width:100%;height:200px;display:block"></canvas></div>
</div>
<div class="chart-row">
  <div class="chart-card"><div class="head"><h3>Memory (MB)</h3></div><canvas id="chart-mem" style="width:100%;height:200px;display:block"></canvas></div>
  <div class="chart-card"><div class="head"><h3>Goroutines</h3></div><canvas id="chart-goroutines" style="width:100%;height:200px;display:block"></canvas></div>
</div>
<script>window.__breezeDashPage='overview';</script>
<script data-spa-run="always">
if(window.BreezeDash) BreezeDash.initPage('overview');
BreezeDash.initPage('overview');
</script>
{{end}}
