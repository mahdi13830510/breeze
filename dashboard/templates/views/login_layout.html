{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Breeze Dashboard — Login</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
      --text:#e6edf3;--text-dim:#8b949e;--text-muted:#6e7681;
      --primary:#58a6ff;--primary-dim:#1f6feb;--purple:#bc8cff;
      --err:#f85149;
      --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Helvetica,Arial,sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  </style>
</head>
<body>
  {{template "content" .}}
</body>
</html>
{{end}}
